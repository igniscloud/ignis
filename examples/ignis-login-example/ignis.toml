[project]
name = "ignis_login_example"

[[services]]
name = "api"
kind = "http"
path = "services/api"
prefix = "/api"

[services.http]
component = "target/wasm32-wasip2/release/api.wasm"
base_path = "/"

[services.ignis_login]
display_name = "ignis-login-example"
redirect_path = "/auth/callback"
providers = ["google"]

[services.env]

[services.secrets]

[services.sqlite]
enabled = false

[services.resources]

[services.network]
mode = "allow_list"
allow = ["id.igniscloud.transairobot.com"]

[[services]]
name = "web"
kind = "frontend"
path = "services/web"
prefix = "/"

[services.frontend]
build_command = [
    "bash",
    "-lc",
    "rm -rf dist && mkdir -p dist && cp -R src/. dist/",
]
output_dir = "dist"
spa_fallback = true

[services.env]

[services.secrets]

[services.sqlite]
enabled = false

[services.resources]

[services.network]
mode = "deny_all"
allow = []
